name: Run Arras Bots

on: 
  workflow_dispatch:

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup und Start
        run: |
          cd "arras_bots_setup (2)/arras_bots_setup"
          npm install
          npx playwright install --with-deps chromium
          node arras_bots.js
